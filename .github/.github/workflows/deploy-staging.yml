name: Deploy Staging

# Runs CI verification when commits land on the `staging` branch.
# Vercel's native git integration handles the actual deployment automatically.
# Once VERCEL_TOKEN + DB secrets are configured, add the Vercel CLI and
# migration steps back from docs/DEPLOYMENT_RUNBOOK.md.

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: write   # needed to post commit comments

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  verify:
    name: Verify (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      - name: Build
        run: pnpm turbo build --filter=@undoverse/web
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: undoverse.in
          NEXT_PUBLIC_APP_URL: https://undoverse.in

      - name: Comment success on commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### CI passed — staging deployment triggered',
                '',
                `Commit \`${context.sha.substring(0,7)}\` passed typecheck and build.`,
                'Vercel is deploying to the staging preview automatically.'
              ].join('\n')
            });

      - name: Comment failure on commit
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### CI failed — staging deployment blocked',
                '',
                `Commit \`${context.sha.substring(0,7)}\` failed CI checks.`,
                `See the run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });
