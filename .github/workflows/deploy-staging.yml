name: Deploy Staging

# Deploys undoverse.in to the UAT/staging environment (staging.undoverse.in).
# Triggered when commits land on the `staging` branch.
# Runs Prisma migrations against the Neon staging database, deploys to Vercel,
# then runs smoke tests against the live staging URL.

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  # Never run two staging deploys at once; let the latest win.
  group: deploy-staging
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Migrate & Deploy (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: staging
      url: https://staging.undoverse.in
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      # Apply pending migrations to the Neon STAGING database.
      # DIRECT_URL is the non-pooled Neon connection used for migrations.
      - name: Run database migrations (Neon staging)
        run: pnpm --filter @undoverse/db deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (preview/staging)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy the prebuilt output. We deploy as a preview and then alias it to
      # the stable staging domain so the URL never changes between deploys.
      - name: Deploy to Vercel
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})"
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Alias deployment to staging.undoverse.in
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment-url }}" staging.undoverse.in \
            --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ vars.VERCEL_SCOPE }}

      # Smoke tests hit the real staging URL to confirm it serves traffic.
      - name: Smoke test staging
        run: |
          set -euo pipefail
          base="https://staging.undoverse.in"
          echo "Waiting for $base to respond..."
          for i in $(seq 1 12); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$base" || true)"
            if [ "$code" = "200" ]; then
              echo "Homepage OK ($code)"
              break
            fi
            echo "Attempt $i: got $code, retrying in 10s..."
            sleep 10
            if [ "$i" = "12" ]; then
              echo "Homepage never returned 200"; exit 1
            fi
          done
          # Health endpoint must report healthy.
          health="$(curl -s "$base/api/health" || true)"
          echo "Health response: $health"
          echo "$health" | grep -q '"status":"ok"' || { echo "Health check failed"; exit 1; }

      - name: Comment deployment URL on the staging commit
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### Staging deployment succeeded',
                '',
                '- Stable URL: https://staging.undoverse.in',
                `- This build: ${url}`,
                '',
                `Commit \`${context.sha.substring(0, 7)}\` is now live on UAT.`
              ].join('\n')
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### Staging deployment FAILED',
                '',
                `Commit \`${context.sha.substring(0, 7)}\` failed to deploy to staging.`,
                `See the run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });

      # Optional Slack notification on failure (skipped if webhook not set).
      - name: Slack notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: Staging deploy failed for undoverse.in (commit ${GITHUB_SHA:0:7}). Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"
