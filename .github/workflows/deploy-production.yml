name: Deploy Production

# Deploys undoverse.in to production (undoverse.in).
# Triggered when a PR is merged into `main`.
# Requires manual approval via the `production` GitHub Environment
# (configure required reviewers in repo Settings → Environments → production).

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Re-run the full test suite once more before touching production.
  verify:
    name: Verify (full test suite)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
        env:
          NEXT_PUBLIC_ROOT_DOMAIN: undoverse.in
          NEXT_PUBLIC_APP_URL: https://undoverse.in

  deploy:
    name: Migrate & Deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    # The `production` environment gates this job behind required reviewers.
    environment:
      name: production
      url: https://undoverse.in
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can build a changelog from the last tag.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      # Apply pending migrations to the Neon PRODUCTION database.
      - name: Run database migrations (Neon production)
        run: pnpm --filter @undoverse/db deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})"
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      # Post-deploy health checks against the live production domain.
      - name: Post-deploy health checks
        run: |
          set -euo pipefail
          base="https://undoverse.in"
          echo "Verifying $base ..."
          for i in $(seq 1 18); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$base" || true)"
            if [ "$code" = "200" ]; then
              echo "Homepage OK ($code)"
              break
            fi
            echo "Attempt $i: got $code, retrying in 10s..."
            sleep 10
            if [ "$i" = "18" ]; then
              echo "Homepage never returned 200"; exit 1
            fi
          done
          health="$(curl -s "$base/api/health" || true)"
          echo "Health response: $health"
          echo "$health" | grep -q '"status":"ok"' || { echo "Health check failed"; exit 1; }

      # Compute a version tag and a changelog from commits since the last tag.
      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail
          date_tag="$(date -u +'%Y.%m.%d')"
          # Disambiguate multiple releases on the same day with a run number.
          tag="v${date_tag}-${GITHUB_RUN_NUMBER}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          prev_tag="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi
          {
            echo "changelog<<EOF"
            git log "$range" --pretty=format:'- %s (%h)' --no-merges
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            const changelog = `${{ steps.meta.outputs.changelog }}`;
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              target_commitish: context.sha,
              body: [
                '## undoverse.in production release',
                '',
                `Deployed to https://undoverse.in (${url}).`,
                '',
                '### Changes',
                changelog || '- No changes recorded.'
              ].join('\n'),
              draft: false,
              prerelease: false
            });

      - name: Notify team on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### Production deployment succeeded',
                '',
                `Release \`${{ steps.meta.outputs.tag }}\` is now live at https://undoverse.in`
              ].join('\n')
            });

      - name: Slack notify on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: undoverse.in production deploy succeeded — release ${{ steps.meta.outputs.tag }} is live at https://undoverse.in\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify team on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '### Production deployment FAILED',
                '',
                `Deploy of commit \`${context.sha.substring(0, 7)}\` to production failed.`,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });

      - name: Slack notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: undoverse.in PRODUCTION deploy FAILED (commit ${GITHUB_SHA:0:7}). Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"
