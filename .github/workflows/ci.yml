name: CI

# Continuous Integration for undoverse.in
# Runs on every pull request targeting the integration branches.
# Lint, typecheck, test and build all run in parallel where possible,
# share a warm pnpm store cache, and use Turborepo remote caching.

on:
  pull_request:
    branches:
      - develop
      - staging
  # Allow manual runs from the Actions tab for debugging.
  workflow_dispatch:

# Cancel superseded runs on the same PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Turborepo remote caching (Vercel Remote Cache).
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # Make turbo a little quieter and deterministic in CI.
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all workspaces
        run: pnpm turbo run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client must exist before tsc can resolve @undoverse/db types.
      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      - name: Typecheck all workspaces
        run: pnpm turbo run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      - name: Run tests
        run: pnpm turbo run test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @undoverse/db generate

      - name: Build all workspaces
        run: pnpm turbo run build
        env:
          # Build-time public env so Next.js can inline NEXT_PUBLIC_* values.
          # These are non-secret placeholders sufficient for a CI build.
          NEXT_PUBLIC_ROOT_DOMAIN: undoverse.in
          NEXT_PUBLIC_APP_URL: https://undoverse.in
